<section
  class="flex flex-col items-center justify-center min-h-screen gap-6 bg-sky-50"
>
  <div class="p-3 md:p-6 flex justify-center">
    <img
      [src]="imgUrl"
      class="max-w-80 md:max-w-96 rounded-xl shadow-lg hover:scale-105 transition-transform duration-300"
      alt="not-found img"
    />
  </div>

  <button
    routerLink=""
    class="px-6 py-3 text-lg font-semibold text-white bg-sky-500 rounded-xl shadow-md hover:bg-sky-600 hover:shadow-lg active:scale-95 transition-all duration-200"
  >
    Get Weather
  </button>
</section>
