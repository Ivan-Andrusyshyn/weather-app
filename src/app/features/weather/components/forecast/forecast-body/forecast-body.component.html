<div class="flex flex-col items-center mt-4 md:mt-6">
  <img
    [src]="iconUrl()"
    alt="weather icon"
    class="w-28 min-h-28 md:w-32 weather-icon"
  />
  <h3 class="font-semibold text-2xl md:text-4xl xl:text-5xl">
    {{ title() }}
  </h3>

  <p class="text-2xl md:text-4xl xl:text-6xl font-bold tracking-tight mt-2">
    {{ temperature() }}°C
  </p>

  <div class="flex items-center gap-2 mt-2">
    <div class="flex items-center gap-2">
      <img [src]="iconUrl()" alt="weather small icon" class="w-8 h-8" />
      <p class="text-base md:text-lg capitalize font-medium">
        {{ description() }}
      </p>
    </div>
  </div>
</div>
