<form
  class="w-full mx-auto relative min-h-20"
  [formGroup]="searchForm()"
  (ngSubmit)="submit()"
>
  <div class="relative">
    <input
      #searchInput
      type="search"
      placeholder="Type city..."
      (focus)="onFocus.emit()"
      (blur)="onBlur.emit()"
      formControlName="city"
      class="w-full p-3 pr-32 border border-gray-300 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition duration-200 placeholder-gray-400 text-gray-800"
    />

    <button
      type="submit"
      class="absolute right-1 top-1/2 -translate-y-1/2 bg-blue-500 hover:bg-blue-600 text-white font-semibold px-4 py-2 rounded-full shadow-md transition duration-200"
    >
      Search
    </button>
  </div>

  <ng-content select="app-search-list"></ng-content>
  <ng-content select="app-form-errors"></ng-content>
</form>
