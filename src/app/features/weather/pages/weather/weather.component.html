<section class="flex w-full justify-center p-2 xl:p-6">
  <div class="md:p-4 xl:p-6 w-full">
    <h2
      class="title text-center font-extrabold tracking-tight mb-4 xl:mb-6 text-2xl md:text-4xl xl:text-6xl"
    >
      Weather
    </h2>
    <div class="md:max-w-3xl xl:max-w-4xl mx-auto">
      <app-search-form
        (onFocus)="onFocus()"
        (onBlur)="onBlur()"
        (onSubmit)="onSubmit()"
        [searchForm]="searchForm"
      >
        <app-form-errors
          [control]="searchForm.controls['city']"
          [cityErrorMessages]="cityErrorMessages"
          [isSubmitted]="isSubmitted"
        ></app-form-errors>
        <app-search-list
          (selectCity)="selectCity($event)"
          (clearSearchList)="clearSearchList()"
          [searchList]="searchList()"
          [showSearchList]="showSearchList()"
        ></app-search-list>
      </app-search-form>
      <div class="mt-4 md:mt-6 xl:mt-8">
        @if (!searchList().length && !isSubmitted) {
          <app-weather-placeholder></app-weather-placeholder>
        } @else {
          <router-outlet></router-outlet>
        }
      </div>
    </div>
  </div>
</section>
